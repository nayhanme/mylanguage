<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyLang Studio Pro</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: #2d2d44; padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #444; flex-wrap: wrap; }
  header h1 { font-size: 16px; color: #8be9fd; }
  .toolbar { display: flex; gap: 6px; flex-wrap: wrap; }
  .toolbar button { background: #3a3a55; color: #e0e0e0; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .toolbar button:hover { background: #4a4a70; }
  .toolbar button.active { background: #8be9fd; color: #1e1e2e; font-weight: bold; }
  .toolbar button.run { background: #50fa7b; color: #1e1e2e; font-weight: bold; }
  .toolbar button.run:hover { background: #6eff94; }
  
  /* 3-Column Layout with Project Manager Sidebar */
  .main { flex: 1; display: grid; grid-template-columns: 240px 1fr 1fr; gap: 2px; overflow: hidden; }
  
  /* Sidebar styles */
  .sidebar { background: #1a1a26; border-right: 2px solid #333; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 12px; background: #2d2d44; border-bottom: 1px solid #444; display: flex; flex-direction: column; gap: 8px; }
  .sidebar-header h3 { font-size: 13px; color: #8be9fd; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-primary { background: #bd93f9; color: #1e1e2e; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; text-align: center; transition: background 0.2s; }
  .btn-primary:hover { background: #ff79c6; }
  .project-list { flex: 1; overflow-y: auto; list-style: none; padding: 6px; }
  .project-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 4px; font-size: 13px; color: #cbd5e1; transition: background 0.2s; }
  .project-item:hover { background: #2d2d44; }
  .project-item.active { background: #3a3a55; color: #8be9fd; border-left: 3px solid #8be9fd; }
  .project-info { display: flex; flex-direction: column; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .project-meta { font-size: 10px; color: #6272a4; margin-top: 2px; }
  .btn-delete { background: transparent; color: #ff5555; border: none; cursor: pointer; padding: 2px 6px; font-size: 12px; border-radius: 3px; transition: background 0.2s; }
  .btn-delete:hover { background: rgba(255, 85, 85, 0.2); }

  .panel { display: flex; flex-direction: column; background: #252538; overflow: hidden; }
  .panel-header { background: #2d2d44; padding: 6px 12px; font-size: 12px; color: #8be9fd; display: flex; justify-content: space-between; align-items: center; }
  .editor-wrap { flex: 1; position: relative; overflow: hidden; }
  .editor { width: 100%; height: 100%; background: #1e1e2e; color: #f8f8f2; border: none; padding: 12px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; tab-size: 2; }
  .output-tabs { display: flex; background: #2d2d44; border-bottom: 1px solid #444; }
  .output-tabs button { background: transparent; color: #aaa; border: none; padding: 8px 14px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; }
  .output-tabs button.active { color: #8be9fd; border-bottom-color: #8be9fd; }
  .output-content { flex: 1; position: relative; overflow: hidden; }
  .console, .preview-frame { position: absolute; inset: 0; width: 100%; height: 100%; }
  .console { background: #0d0d1a; color: #50fa7b; padding: 10px; font-family: 'Consolas', monospace; font-size: 13px; overflow-y: auto; white-space: pre-wrap; display: none; }
  .console.active { display: block; }
  .preview-frame { border: none; background: white; display: none; }
  .preview-frame.active { display: block; }
  .video-panel { padding: 20px; text-align: center; display: none; }
  .video-panel.active { display: block; }
  .status { background: #2d2d44; padding: 4px 12px; font-size: 11px; color: #aaa; border-top: 1px solid #444; display: flex; justify-content: space-between; }
  .log-info { color: #8be9fd; }
  .log-error { color: #ff5555; }
  .log-warn { color: #f1fa8c; }
  .log-html { color: #bd93f9; font-style: italic; }
  .log-success { color: #50fa7b; font-weight: bold; }
</style>
</head>
<body>

<header>
  <h1>🎨 MyLang STUDIO v0.3</h1>
  <div class="toolbar">
    <button data-mode="mylang" class="active">MyLang</button>
    <button data-mode="designlang">🎨 DesignLang</button>
    <button data-mode="html">HTML</button>
    <button data-mode="css">CSS</button>
    <button data-mode="js">JS</button>
    <button class="run" id="runBtn">▶ RUN</button>
    <button id="clearBtn">✕ Clear</button>
    <button id="formatBtn">⇌ Format</button>
    <button id="copyBtn">⎘ Copy</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📁 Workspace Explorer</h3>
      <button class="btn-primary" id="newProjBtn">➕ New Project / File</button>
    </div>
    <ul class="project-list" id="projectList"></ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>📝 <span id="modeLabel">MyLang</span> Code</span>
      <span id="lineCount">Lines: 1</span>
    </div>
    <div class="editor-wrap">
      <textarea id="editor" class="editor" spellcheck="false"></textarea>
    </div>
  </div>

  <div class="panel">
    <div class="output-tabs">
      <button data-tab="console" class="active">⬛ Console</button>
      <button data-tab="preview">🌐 Preview</button>
      <button data-tab="video">▶ Video</button>
    </div>
    <div class="output-content">
      <div id="console" class="console active"></div>
      <iframe id="preview" class="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
      <div id="videoPanel" class="video-panel">
        <p>🎬 Drop a video file here</p>
        <input type="file" id="videoInput" accept="video/*">
        <video id="videoPlayer" controls style="max-width:100%;margin-top:10px;"></video>
      </div>
    </div>
  </div>
</div>

<div class="status">
  <span id="statusText">Ready</span>
  <span>MyLang Studio v0.3 — Persistent Multi-Language IDE</span>
</div>

<script>
/* ============ STATE & TEMPLATES ============ */
const editor = document.getElementById('editor');
const consoleEl = document.getElementById('console');
const preview = document.getElementById('preview');
const modeLabel = document.getElementById('modeLabel');
const lineCount = document.getElementById('lineCount');
const statusText = document.getElementById('statusText');
const projectListEl = document.getElementById('projectList');

let currentMode = 'mylang';
let currentTab = 'console';

const defaultCode = {
  mylang: `// MyLang Example\nprint "Hello, World!"\nlet name = "Designer"\nprint "Welcome, " + name`,
  designlang: `<page bg="#f0f4ff" padding="20" font="sans-serif">\n  <header size="32" color="#2d3748" bold>Welcome to DesignLang 🎨</header>\n  <paragraph color="#4a5568" size="16">Build beautiful UIs with simple tags.</paragraph>\n\n  <box flex="row" gap="10" margin-top="20">\n    <button bg="#8be9fd" color="#1e1e2e" click="alert('Hello!')">Click Me</button>\n    <button bg="#ff5555" color="white" hover:bg="#ff7777" click="alert('Danger!')">Danger</button>\n  </box>\n\n  <box margin-top="20" bg="white" padding="15" radius="8" shadow>\n    <text size="18" bold>Your Info</text>\n    <input type="text" placeholder="Enter your name" />\n    <input type="email" placeholder="Email" />\n  </box>\n\n  <list margin-top="20">\n    <item>🎨 Clean attribute syntax</item>\n    <item>⚡ Real parser (no regex hacks)</item>\n    <item>🚀 Live preview</item>\n  </list>\n\n  <link href="https://example.com" color="#5a67d8" margin-top="20">Visit Example →</link>\n\n  <text animate="bounce" duration="2s" margin-top="20">Bouncing text!</text>\n</page>`,
  html: `<h1>Hello HTML</h1>\n<p>Edit me!</p>`,
  css: `body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }`,
  js: `console.log("Hello from JS!");`
};

/* ============ LOCAL STORAGE STORAGE ENGINE ============ */
let projects = [];
try {
  projects = JSON.parse(localStorage.getItem('mylang_studio_projects'));
} catch (e) {}

if (!projects || !Array.isArray(projects) || projects.length === 0) {
  projects = [
    { id: '1', name: 'MyLang Demo', mode: 'mylang', code: defaultCode.mylang },
    { id: '2', name: 'DesignLang Live UI', mode: 'designlang', code: defaultCode.designlang },
    { id: '3', name: 'Web HTML Boilerplate', mode: 'html', code: defaultCode.html }
  ];
  localStorage.setItem('mylang_studio_projects', JSON.stringify(projects));
}

let currentProjectId = localStorage.getItem('mylang_studio_current_id') || projects[0].id;
if (!projects.find(p => p.id === currentProjectId)) {
  currentProjectId = projects[0].id;
}

/* ============ WORKSPACE HISTORY LOGIC ============ */
function renderProjectList() {
  projectListEl.innerHTML = '';
  projects.forEach(p => {
    const li = document.createElement('li');
    li.className = `project-item ${p.id === currentProjectId ? 'active' : ''}`;
    
    const info = document.createElement('div');
    info.className = 'project-info';
    
    const nameSpan = document.createElement('span');
    nameSpan.textContent = p.name;
    nameSpan.style.fontWeight = '500';
    
    const metaSpan = document.createElement('span');
    metaSpan.className = 'project-meta';
    metaSpan.textContent = p.mode.toUpperCase();
    
    info.appendChild(nameSpan);
    info.appendChild(metaSpan);
    
    const delBtn = document.createElement('button');
    delBtn.className = 'btn-delete';
    delBtn.innerHTML = '✕';
    delBtn.title = 'Remove File';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteProject(p.id);
    });
    
    li.appendChild(info);
    li.appendChild(delBtn);
    
    li.addEventListener('click', () => {
      switchProject(p.id);
    });
    
    projectListEl.appendChild(li);
  });
}

function switchProject(id) {
  const currentProj = projects.find(p => p.id === currentProjectId);
  if (currentProj) currentProj.code = editor.value;
  
  currentProjectId = id;
  localStorage.setItem('mylang_studio_current_id', id);
  localStorage.setItem('mylang_studio_projects', JSON.stringify(projects));
  
  const nextProj = projects.find(p => p.id === id);
  if (nextProj) {
    editor.value = nextProj.code;
    currentMode = nextProj.mode;
    
    document.querySelectorAll('.toolbar button[data-mode]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === currentMode);
    });
    
    modeLabel.textContent = {mylang:'MyLang', designlang:'DesignLang 🎨', html:'HTML', css:'CSS', js:'JavaScript'}[currentMode];
    updateLineCount();
  }
  renderProjectList();
}

function deleteProject(id) {
  if (projects.length <= 1) {
    alert('Workspace requires at least one active file/project.');
    return;
  }
  if (confirm('Are you sure you want to delete this file?')) {
    projects = projects.filter(p => p.id !== id);
    if (currentProjectId === id) {
      currentProjectId = projects[0].id;
    }
    localStorage.setItem('mylang_studio_current_id', currentProjectId);
    localStorage.setItem('mylang_studio_projects', JSON.stringify(projects));
    switchProject(currentProjectId);
  }
}

document.getElementById('newProjBtn').addEventListener('click', () => {
  const name = prompt('Enter a name for your new file:', 'Untitled File');
  if (!name || !name.trim()) return;
  
  const mode = prompt('Enter language type (mylang, designlang, html, css, js):', 'mylang').toLowerCase().trim();
  const validMode = ['mylang', 'designlang', 'html', 'css', 'js'].includes(mode) ? mode : 'mylang';
  
  const newId = 'proj_' + Date.now();
  const newProj = {
    id: newId,
    name: name.trim(),
    mode: validMode,
    code: defaultCode[validMode] || ''
  };
  
  projects.push(newProj);
  localStorage.setItem('mylang_studio_projects', JSON.stringify(projects));
  switchProject(newId);
});

function saveCurrentProjectCode() {
  const currentProj = projects.find(p => p.id === currentProjectId);
  if (currentProj) {
    currentProj.code = editor.value;
    localStorage.setItem('mylang_studio_projects', JSON.stringify(projects));
  }
}

/* ============ MODE SWITCHING ============ */
document.querySelectorAll('.toolbar button[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toolbar button[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    currentMode = btn.dataset.mode;
    const currentProj = projects.find(p => p.id === currentProjectId);
    if (currentProj) {
      currentProj.mode = currentMode;
    }
    
    modeLabel.textContent = {mylang:'MyLang', designlang:'DesignLang 🎨', html:'HTML', css:'CSS', js:'JavaScript'}[currentMode];
    saveCurrentProjectCode();
    renderProjectList();
    updateLineCount();
  });
});

/* ============ TABS ============ */
document.querySelectorAll('.output-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.output-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById('console').classList.toggle('active', currentTab === 'console');
    document.getElementById('preview').classList.toggle('active', currentTab === 'preview');
    document.getElementById('videoPanel').classList.toggle('active', currentTab === 'video');
  });
});

/* ============ LOGGING ============ */
function log(msg, cls = '') {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = msg;
  consoleEl.appendChild(div);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}
function clearConsole() { consoleEl.innerHTML = ''; }

/* ============ HTML STRING SANITIZATION HELPERS ============ */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(str) {
  if (!str) return '';
  return str.replace(/"/g, '&quot;');
}

/* ============ MYLANG INTERPRETER ============ */
function runMyLang(code) {
  const vars = {};
  const lines = code.split('\n');
  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('//')) continue;
    let m = line.match(/^let\s+(\w+)\s*=\s*(.+)$/);
    if (m) { vars[m[1]] = evalExpr(m[2], vars); continue; }
    m = line.match(/^print\s+(.+)$/);
    if (m) { log(evalExpr(m[1], vars), 'log-info'); continue; }
    log('Unknown: ' + line, 'log-warn');
  }
}
function evalExpr(s, vars) {
  s = s.trim();
  if (s.includes('+')) return s.split('+').map(p => evalExpr(p.trim(), vars)).join('');
  if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))) return s.slice(1, -1);
  if (!isNaN(s) && s !== '') return s;
  if (vars[s] !== undefined) return vars[s];
  return s;
}

/* ============ DESIGNLANG COMPILER ENGINE ============ */
function tokenize(src) {
  const tokens = [];
  let i = 0;
  while (i < src.length) {
    if (src[i] === '<') {
      if (src[i+1] === '/') {
        i += 2;
        let name = '';
        while (i < src.length && src[i] !== '>' && !/\s/.test(src[i])) { name += src[i]; i++; }
        while (i < src.length && src[i] !== '>') i++;
        i++; 
        tokens.push({type:'CLOSE', name});
        continue;
      }
      i++; 
      let name = '';
      while (i < src.length && /[a-zA-Z0-9_:\-]/.test(src[i])) { name += src[i]; i++; }
      const attrs = [];
      while (i < src.length) {
        while (i < src.length && /\s/.test(src[i])) i++;
        if (src[i] === '>' || (src[i] === '/' && src[i+1] === '>')) break;
        let attrName = '';
        while (i < src.length && /[a-zA-Z0-9_:\-]/.test(src[i])) { attrName += src[i]; i++; }
        if (!attrName) { i++; continue; }
        while (i < src.length && /\s/.test(src[i])) i++;
        let attrValue = '';
        if (src[i] === '=') {
          i++;
          while (i < src.length && /\s/.test(src[i])) i++;
          const q = src[i];
          if (q === '"' || q === "'") {
            i++;
            while (i < src.length && src[i] !== q) { attrValue += src[i]; i++; }
            if (src[i] === q) i++;
          } else {
            while (i < src.length && !/[\s>]/.test(src[i])) { attrValue += src[i]; i++; }
          }
        }
        attrs.push({name: attrName, value: attrValue});
      }
      let selfClose = false;
      if (src[i] === '/' && src[i+1] === '>') { selfClose = true; i += 2; }
      else if (src[i] === '>') { i++; }
      tokens.push({type:'OPEN', name, attrs, selfClose});
    } else {
      let text = '';
      while (i < src.length && src[i] !== '<') { text += src[i]; i++; }
      if (text.trim()) tokens.push({type:'TEXT', value:text});
    }
  }
  tokens.push({type:'EOF'});
  return tokens;
}

function parse(tokens) {
  let pos = 0;
  function parseChildren(stopTag) {
    const children = [];
    while (pos < tokens.length) {
      const t = tokens[pos];
      if (t.type === 'EOF') break;
      if (t.type === 'CLOSE') {
        if (stopTag && t.name === stopTag) { pos++; return children; }
        pos++; continue;
      }
      if (t.type === 'TEXT') {
        children.push({type:'text', value:t.value});
        pos++;
      } else if (t.type === 'OPEN') {
        const node = {type:'element', name:t.name, attrs:{}, children:[]};
        for (const a of t.attrs) node.attrs[a.name] = a.value;
        pos++;
        if (!t.selfClose) node.children = parseChildren(t.name);
        children.push(node);
      } else pos++;
    }
    return children;
  }
  return parseChildren(null);
}

const TAG_MAP = {
  page:'div', header:'h1', text:'span', paragraph:'p',
  button:'button', image:'img', input:'input', form:'form',
  box:'div', section:'section', div:'div',
  list:'ul', item:'li', link:'a'
};

const CSS_PROPS = {
  'bg':'background','color':'color','size':'font-size',
  'flex':'display:flex', 'gap':'gap','padding':'padding',
  'margin':'margin','margin-top':'margin-top','margin-bottom':'margin-bottom',
  'radius':'border-radius','width':'width','height':'height',
  'font':'font-family','align':'text-align','border':'border',
  'padding-top':'padding-top','padding-bottom':'padding-bottom'
};

const ANIMATIONS = {
  fade:'from{opacity:0}to{opacity:1}',
  slide:'from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}',
  bounce:'0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}',
  spin:'from{transform:rotate(0)}to{transform:rotate(360deg)}',
  pulse:'0%,100%{transform:scale(1)}50%{transform:scale(1.05)}'
};

function render(ast) {
  let css = '', js = '', idCounter = 0;
  const nextId = () => 'dl_' + (idCounter++);

  function renderChildren(nodes) {
    return nodes.map(renderNode).join('');
  }

  function renderNode(node) {
    if (node.type === 'text') return escapeHtml(node.value);
    if (node.type !== 'element') return '';

    const id = nextId();
    const tag = TAG_MAP[node.name] || 'div';
    const attrs = node.attrs;
    const styles = [];
    let extraCss = '';

    for (const key in attrs) {
      if (key.startsWith('hover:') || key === 'click' || key === 'animate' || key === 'duration') continue;
      if (key === 'bold' && (attrs[key] === '' || attrs[key] === 'true')) { styles.push('font-weight:bold'); continue; }
      if (key === 'shadow' && (attrs[key] === '' || attrs[key] === 'true')) { styles.push('box-shadow:0 2px 8px rgba(0,0,0,0.15)'); continue; }
      if (key === 'italic' && (attrs[key] === '' || attrs[key] === 'true')) { styles.push('font-style:italic'); continue; }
      if (key === 'center' && (attrs[key] === '' || attrs[key] === 'true')) { styles.push('justify-content:center','align-items:center'); continue; }
      if (key === 'wrap' && (attrs[key] === '' || attrs[key] === 'true')) { styles.push('flex-wrap:wrap'); continue; }

      if (CSS_PROPS[key]) {
        if (key === 'flex') {
          styles.push('display:flex');
          if (attrs[key] && attrs[key] !== 'true') styles.push(`flex-direction:${attrs[key]}`);
        } else {
          let v = attrs[key];
          if (['size','gap','padding','margin','margin-top','margin-bottom','radius','width','height','padding-top','padding-bottom'].includes(key) && /^\d+$/.test(v)) v += 'px';
          styles.push(`${CSS_PROPS[key]}:${v}`);
        }
      }
    }

    const hoverRules = [];
    for (const key in attrs) {
      if (key.startsWith('hover:')) {
        const prop = key.slice(6);
        if (CSS_PROPS[prop]) {
          let v = attrs[key];
          if (prop === 'size' && /^\d+$/.test(v)) v += 'px';
          hoverRules.push(`${CSS_PROPS[prop]}:${v}!important`);
        }
      }
    }
    if (hoverRules.length) extraCss += `#${id}:hover{${hoverRules.join(';')}}\n`;

    if (attrs.animate) {
      const frames = ANIMATIONS[attrs.animate] || ANIMATIONS.fade;
      extraCss += `@keyframes ${id}_a{${frames}}\n`;
      styles.push(`animation:${id}_a ${attrs.duration || '1s'} infinite`);
    }

    if (extraCss) css += extraCss;

    let clickAttr = '';
    if (attrs.click) clickAttr = ` onclick="${escapeAttr(attrs.click)}"`;

    let tagAttrs = '';
    if (tag === 'img') tagAttrs += ` src="${attrs.src || ''}"`;
    if (tag === 'input') tagAttrs += ` type="${attrs.type || 'text'}" placeholder="${attrs.placeholder || ''}"`;
    if (tag === 'a') tagAttrs += ` href="${attrs.href || '#'}"`;
    if (tag === 'form') tagAttrs += ` action="${attrs.action || ''}"`;

    const styleStr = styles.length ? ` style="${styles.join(';')}"` : '';
    const inner = renderChildren(node.children);

    if (['img','input'].includes(tag)) return `<${tag} id="${id}"${tagAttrs}${styleStr} />`;
    return `<${tag} id="${id}"${tagAttrs}${styleStr}${clickAttr}>${inner}</${tag}>`;
  }

  const html = renderChildren(ast);
  return {html, css, js};
}

function runDesignLang(code) {
  log('🎨 Tokenizing DesignLang...', 'log-info');
  try {
    const tokens = tokenize(code);
    log(`  ✓ ${tokens.length - 1} tokens parsed`, 'log-info');

    log('🔨 Parsing Syntax AST Tree...', 'log-info');
    const ast = parse(tokens);
    log(`  ✓ ${ast.length} root nodes structured`, 'log-info');

    log('🎨 Transpiling directly to HTML5 & CSS3...', 'log-info');
    const {html, css, js} = render(ast);

    const fullHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
      body{margin:0;font-family:sans-serif}
      button{cursor:pointer;padding:8px 16px;border:none;border-radius:4px;font-size:14px;transition:all .2s}
      input{padding:8px;border:1px solid #ccc;border-radius:4px;margin:4px 0;width:100%;box-sizing:border-box}
      ul{padding-left:20px}
      a{text-decoration:none}a:hover{text-decoration:underline}
      ${css}
    </style></head><body>${html}<script>${js}<\/script></body></html>`;

    preview.srcdoc = fullHTML;
    log('✅ DesignLang compiled successfully!', 'log-success');
    log('───── Rendered Content Source ─────', 'log-html');
    log(html, 'log-html');
    if (css.trim()) { log('───── Appended Compiled Styles ─────', 'log-html'); log(css, 'log-html'); }
    
    document.querySelector('[data-tab="preview"]').click();
  } catch (e) {
    log('❌ DesignLang Compilation Error: ' + e.message, 'log-error');
  }
}

/* ============ STANDARDIZED LANGUAGES ENGINE ============ */
function runHTML(code) {
  preview.srcdoc = code;
  log('✅ HTML markup rendering initialized', 'log-success');
  document.querySelector('[data-tab="preview"]').click();
}
function runCSS(code) {
  preview.srcdoc = `<html><head><style>${code}</style></head><body>${defaultCode.html}</body></html>`;
  log('✅ CSS rules injected to test window', 'log-success');
  document.querySelector('[data-tab="preview"]').click();
}
function runJS(code) {
  const origLog = console.log;
  console.log = (...args) => { log(args.join(' '), 'log-info'); origLog(...args); };
  try { eval(code); log('✅ Script process completed', 'log-success'); }
  catch (e) { log('❌ execution fail: ' + e.message, 'log-error'); }
  console.log = origLog;
}

/* ============ CONTROLLER LISTENERS ============ */
document.getElementById('runBtn').addEventListener('click', () => {
  clearConsole();
  statusText.textContent = 'Executing...';
  const code = editor.value;
  try {
    if (currentMode === 'mylang') runMyLang(code);
    else if (currentMode === 'designlang') runDesignLang(code);
    else if (currentMode === 'html') runHTML(code);
    else if (currentMode === 'css') runCSS(code);
    else if (currentMode === 'js') runJS(code);
    statusText.textContent = 'Execution finished';
  } catch (e) {
    log('❌ System Error: ' + e.message, 'log-error');
    statusText.textContent = 'Halted';
  }
});

document.getElementById('clearBtn').addEventListener('click', clearConsole);
document.getElementById('formatBtn').addEventListener('click', () => {
  editor.value = editor.value.trim();
  saveCurrentProjectCode();
  log('✨ Formatted document syntax', 'log-info');
});
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(editor.value);
  log('📋 Document content saved to clipboard', 'log-info');
});

editor.addEventListener('input', () => {
  updateLineCount();
  saveCurrentProjectCode();
});

function updateLineCount() {
  lineCount.textContent = 'Lines: ' + editor.value.split('\n').length;
}

/* ============ VIDEO INTERACTION ============ */
const videoInput = document.getElementById('videoInput');
const videoPlayer = document.getElementById('videoPlayer');
videoInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) {
    videoPlayer.src = URL.createObjectURL(file);
    log('🎬 Connected multimedia handle: ' + file.name, 'log-info');
  }
});

/* ============ STARTUP ACCELERATION ============ */
const activeProj = projects.find(p => p.id === currentProjectId);
if (activeProj) {
  editor.value = activeProj.code;
  currentMode = activeProj.mode;
  document.querySelectorAll('.toolbar button[data-mode]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === currentMode);
  });
  modeLabel.textContent = {mylang:'MyLang', designlang:'DesignLang 🎨', html:'HTML', css:'CSS', js:'JavaScript'}[currentMode];
}

updateLineCount();
renderProjectList();
log('🎨 Welcome back to MyLang Studio Pro.', 'log-success');
log('Press ▶ RUN to execute or compile workspace assets.', 'log-info');
</script>
</body>
</html>
